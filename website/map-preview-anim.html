<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaartanimatie Groningen – Barcelona</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* Primary 900 uit HyperBRIDGE design system — past op page-background. */
        background: #491303;
      }
      #map {
        position: absolute;
        inset: 0;
        background: #491303;
      }
      /* Brand-skin: tint de lichte OSM-tegels naar Primary 900 (#491303).
         Filter ligt uitsluitend op .leaflet-tile, dus markers, polylines,
         tooltips en overlays blijven hun eigen kleur houden. */
      .leaflet-tile {
        filter: invert(0.92) hue-rotate(180deg) sepia(0.55) saturate(1.35)
          hue-rotate(-18deg) brightness(0.86) contrast(0.95);
      }
      /* Tooltip-stijl: donker met witte tekst, geen pijl. */
      .leaflet-tooltip.city-label {
        background: rgba(15, 23, 42, 0.85);
        color: #f8fafc;
        border: 1px solid rgba(248, 250, 252, 0.35);
        font-weight: 600;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .leaflet-tooltip.city-label::before {
        display: none;
      }
      /* Marker-icoon krijgt een zachte halo zodat het opvalt op de kaart. */
      .anim-marker {
        filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.6))
          drop-shadow(0 0 8px rgba(255, 255, 255, 0.25));
      }
      .anim-marker.hyperloop {
        filter: drop-shadow(0 0 6px rgba(247, 124, 88, 0.9))
          drop-shadow(0 0 12px rgba(247, 124, 88, 0.55));
      }
      /* Banner met legenda + uitleg, linksboven, niet-intrusief. */
      .anim-legend {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 500;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        padding: 8px 12px;
        border-radius: 10px;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        line-height: 1.35;
        pointer-events: none;
        max-width: 240px;
      }
      .anim-legend strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }
      .anim-legend ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .anim-legend li {
        display: grid;
        grid-template-columns: 18px 1fr auto;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
      }
      .anim-legend .swatch {
        width: 14px;
        height: 3px;
        border-radius: 2px;
      }
      .anim-legend .label {
        font-weight: 500;
      }
      .anim-legend .time {
        font-variant-numeric: tabular-nums;
        color: #fbbaa6; /* Primary 200 — opvallend maar zacht */
        font-weight: 600;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="anim-legend" aria-hidden="true">
      <strong>Groningen → Barcelona</strong>
      <ul>
        <li>
          <span class="swatch" style="background:#f77c58"></span>
          <span class="label">Hyperloop</span>
          <span class="time">±1 u 30 min</span>
        </li>
        <li>
          <span class="swatch" style="background:#94a3b8"></span>
          <span class="label">Vliegtuig</span>
          <span class="time">±2 u 30 min</span>
        </li>
        <li>
          <span class="swatch" style="background:#facc15"></span>
          <span class="label">Trein</span>
          <span class="time">±15 u</span>
        </li>
      </ul>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (function () {
        // ——— Endpoints + waypoints ———
        const GRO = [53.22, 6.57];
        const BCN = [41.39, 2.17];

        // Vliegtuigboog: lichte westelijke kromming via Bezier.
        function quadBezier(p0, p1, p2, steps) {
          const pts = [];
          for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const u = 1 - t;
            pts.push([
              u * u * p0[0] + 2 * u * t * p1[0] + t * t * p2[0],
              u * u * p0[1] + 2 * u * t * p1[1] + t * t * p2[1],
            ]);
          }
          return pts;
        }

        const ROUTES = {
          // Hyperloop: korte tussenboog door Centraal-Europa — visueel direct.
          hyperloop: [GRO, [50.5, 5.0], BCN],
          // Vliegtuig: brede curve westwaarts.
          plane: quadBezier(GRO, [49.0, -1.0], BCN, 40),
          // Trein: realistisch grondtraject Nederland → België → Frankrijk → Catalonië.
          train: [
            GRO,
            [52.37, 4.9], // Amsterdam
            [51.22, 4.4], // Antwerpen
            [50.85, 4.35], // Brussel
            [50.63, 3.06], // Rijsel
            [48.85, 2.35], // Parijs
            [47.32, 5.04], // Dijon
            [45.76, 4.84], // Lyon
            [43.61, 3.88], // Montpellier
            [42.69, 2.89], // Perpignan
            BCN,
          ],
        };

        // ——— Polyline-styling ———
        const STYLES = {
          hyperloop: { color: "#f77c58", weight: 4, opacity: 0.95 },
          plane: { color: "#94a3b8", weight: 3, opacity: 0.7, dashArray: "2 8" },
          train: { color: "#facc15", weight: 3, opacity: 0.75, dashArray: "6 6" },
        };

        // ——— Animatietijden (ms) ———
        // Hyperloop arriveert het snelst — kernpunt van de animatie.
        // 5× vertraagd t.o.v. de originele timing zodat de gebruiker tijd heeft
        // om de tekst te lezen en de race rustig kan volgen.
        const DURATION = { hyperloop: 15000, plane: 26000, train: 52500 };
        const PAUSE_MS = 9000;
        const CYCLE_MS = Math.max(...Object.values(DURATION)) + PAUSE_MS;

        // ——— Kaart ———
        const map = L.map("map", {
          zoomControl: false,
          attributionControl: false,
          dragging: false,
          touchZoom: false,
          doubleClickZoom: false,
          scrollWheelZoom: false,
          boxZoom: false,
          keyboard: false,
          tap: false,
        });

        // Zelfde tegellaag als map-app.html zodat de skin-filter consistent oogt.
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 11,
          minZoom: 3,
        }).addTo(map);

        // Zoom strak op het traject (incl. westelijke vliegtuigboog).
        const bounds = L.latLngBounds([GRO, BCN, [49.0, -1.0]]).pad(0.05);
        map.fitBounds(bounds);

        // ——— Routes tekenen ———
        Object.keys(ROUTES).forEach((mode) => {
          L.polyline(ROUTES[mode], STYLES[mode]).addTo(map);
        });

        // ——— Stad-markers met permanente labels ———
        function cityDot(latlng, label, direction) {
          L.circleMarker(latlng, {
            radius: 5,
            color: "#f8fafc",
            weight: 2,
            fillColor: "#f77c58",
            fillOpacity: 1,
          })
            .bindTooltip(label, {
              permanent: true,
              direction,
              className: "city-label",
              offset: direction === "right" ? [8, 0] : [-8, 0],
            })
            .addTo(map);
        }
        cityDot(GRO, "Groningen", "right");
        cityDot(BCN, "Barcelona", "left");

        // ——— Bewegende icoon-markers ———
        function makeIcon(mode, size) {
          return L.icon({
            iconUrl: `./Links/IMG/icons/${mode}.png`,
            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
            className: `anim-marker ${mode}`,
          });
        }
        const markers = {
          hyperloop: L.marker(GRO, { icon: makeIcon("hyperloop", 34), interactive: false }).addTo(map),
          plane: L.marker(GRO, { icon: makeIcon("plane", 28), interactive: false }).addTo(map),
          train: L.marker(GRO, { icon: makeIcon("train", 28), interactive: false }).addTo(map),
        };

        // ——— Punt-op-pad via cumulatieve segmentlengtes ———
        function segLen(a, b) {
          const dx = a[0] - b[0];
          const dy = a[1] - b[1];
          return Math.sqrt(dx * dx + dy * dy);
        }
        function buildCumulative(path) {
          const cum = [0];
          for (let i = 1; i < path.length; i++) cum.push(cum[i - 1] + segLen(path[i - 1], path[i]));
          return cum;
        }
        const CUM = {
          hyperloop: buildCumulative(ROUTES.hyperloop),
          plane: buildCumulative(ROUTES.plane),
          train: buildCumulative(ROUTES.train),
        };

        function pointOnPath(path, cum, t) {
          const total = cum[cum.length - 1];
          const target = t * total;
          // Binary-search-light over kleine arrays is overkill; lineair volstaat.
          for (let i = 1; i < cum.length; i++) {
            if (cum[i] >= target) {
              const segT = (target - cum[i - 1]) / (cum[i] - cum[i - 1] || 1);
              return [
                path[i - 1][0] + (path[i][0] - path[i - 1][0]) * segT,
                path[i - 1][1] + (path[i][1] - path[i - 1][1]) * segT,
              ];
            }
          }
          return path[path.length - 1];
        }

        // ——— Animatieloop ———
        const startTime = performance.now();
        function tick(now) {
          const elapsed = (now - startTime) % CYCLE_MS;
          Object.keys(DURATION).forEach((mode) => {
            const t = Math.min(1, elapsed / DURATION[mode]);
            markers[mode].setLatLng(pointOnPath(ROUTES[mode], CUM[mode], t));
          });
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // ——— Reageer op resize-melding vanuit de parent (gevolgen.html) ———
        window.addEventListener("message", (e) => {
          if (e.data === "ehc-map-invalidate") {
            map.invalidateSize();
            map.fitBounds(bounds);
          }
        });
      })();
    </script>
  </body>
</html>
